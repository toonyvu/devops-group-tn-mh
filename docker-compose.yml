#
# Requirements:
# 1. Frontend service:
#    - Build from ./frontend directory
#    - Expose port 3000
#    - Should depend on backend
#
# 2. Backend service:
#    - Build from ./backend directory
#    - Expose port 8080
#    - Must have environment variables for database connection
#    - Should depend on postgres and wait for it to be healthy
#    - Add a healthcheck
#
# 3. Postgres service:
#    - Use postgres:15-alpine image
#    - Set POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
#    - Use a named volume for data persistence
#    - Mount the init script from ./database/database.sql
#    - Add a healthcheck
#
# 4. Define named volumes
#
# Hints:
# - Research: "docker-compose healthcheck"
# - Research: "docker-compose depends_on condition"
# - Database env vars: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#
# Example healthcheck:
#   healthcheck:
#      test: ['CMD-SHELL', 'pg_isready -U postgres']
#      interval: 10s
#      timeout: 5s
#      retries: 5
# ===========================================

version: "3.8"

services:
  # Frontend service
  frontend:
    build: ./frontend
    ports:
      - "3101:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://backend:3000

  # Backend service
  backend:
    build: ./backend
    ports:
      - "8101:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tododb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', res => process.exit(res.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Postgres service
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

# Named volumes
volumes:
  postgres_data:
